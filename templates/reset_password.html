<!DOCTYPE html>
<html>
<head>
<title>Reset Password</title>

<style>
body {
    margin:0;
    font-family:'Segoe UI';
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    color:white;
}

/* 🔥 BLURRED BACKGROUND */
body::before {
    content:"";
    position:absolute;
    inset:0;
    background: url("/static/bg.jpg") no-repeat center center/cover;
    filter: blur(10px) brightness(0.5);
    transform: scale(1.1);
    z-index:-1;
}

/* 🔥 GLASS CARD */
.box {
    position:relative;
    background: rgba(26,26,26,0.85);
    padding:30px;
    border-radius:20px;
    width:320px;
    backdrop-filter: blur(12px);
    box-shadow:0 0 30px rgba(0,0,0,0.6);
    border:1px solid rgba(255,255,255,0.1);
}

/* INPUT */
input {
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:10px;
    background:#111;
    color:white;
    outline:none;
    transition:0.3s;
}

input:focus {
    border:1px solid #3b82f6;
    box-shadow:0 0 8px #3b82f6;
}

/* BUTTON */
button {
    width:100%;
    padding:12px;
    margin-top:10px;
    background:#3b82f6;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:600;
    transition:0.3s;
}

button:hover {
    background:#2563eb;
    transform: scale(1.05);
}

/* TEXT */
h2 {
    text-align:center;
    color:#3b82f6;
}

.error {
    color:red;
    text-align:center;
}

a {
    color:#3b82f6;
    text-decoration:none;
    display:block;
    text-align:center;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="box">
    <h2>Reset Password</h2>

    <form action="/reset_password" method="POST">
        <input type="password" name="password" placeholder="New Password" required>
        <input type="password" name="confirm" placeholder="Confirm Password" required>
        {% if error %}
        <p class="error">{{ error }}</p>
        {% endif %}
        <button type="submit">Update Password</button>
    </form>
</div>

</body>
</html>
