<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SHIELD-AI | Evidence Gallery</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #3b82f6; --bg: #09090b; --card: #18181b; --border: #27272a; }
        body { margin:0; font-family: 'Inter', sans-serif; background: var(--bg); color: #fafafa; }
        
        .nav { padding: 20px 40px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 40px; }
        
        .filter-bar { padding: 0 40px; margin-top: 20px; display: flex; gap: 15px; }
        select, input { 
            background: var(--card); border: 1px solid var(--border); color: white; 
            padding: 10px; border-radius: 8px; outline: none;
        }

        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; transition: 0.3s; }
        .card:hover { border-color: var(--primary); transform: translateY(-5px); }
        .card img { width: 100%; height: 200px; object-fit: cover; cursor: pointer; }
        .card-body { padding: 15px; font-size: 13px; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .bg-danger { background: #ef4444; }
    </style>
</head>
<body>

<div class="nav">
    <div style="font-size: 1.5rem; font-weight: 800; color: var(--primary);">SHIELD-AI <span style="color:white">GALLERY</span></div>
    <a href="/" style="color: #a1a1aa; text-decoration: none;"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
</div>

<div class="filter-bar">
    <input type="text" id="dateFilter" placeholder="Filter by Date (YYYY-MM-DD)..." onkeyup="filterGallery()">
    <select id="severityFilter" onchange="filterGallery()">
        <option value="">All Severities</option>
        <option value="High">High</option>
        <option value="Medium">Medium</option>
    </select>
</div>

<div class="grid" id="galleryGrid">
    {% for img in images %}
    <div class="card" data-date="{{ img.date }}" data-severity="{{ img.severity }}">
        <img src="{{ img.url }}" onclick="window.open(this.src)">
        <div class="card-body">
            <div style="margin-bottom: 8px; color: #71717a;">{{ img.date }}</div>
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span>Type: <b>{{ img.type }}</b></span>
                <span class="badge bg-danger">{{ img.severity }}</span>
            </div>
        </div>
    </div>
    {% endfor %}
</div>

<script>
    function filterGallery() {
        let dateInput = document.getElementById('dateFilter').value.toLowerCase();
        let sevInput = document.getElementById('severityFilter').value;
        let cards = document.getElementsByClassName('card');

        for (let card of cards) {
            let date = card.getAttribute('data-date').toLowerCase();
            let sev = card.getAttribute('data-severity');
            
            let dateMatch = date.includes(dateInput);
            let sevMatch = sevInput === "" || sev === sevInput;

            card.style.display = (dateMatch && sevMatch) ? "block" : "none";
        }
    }
</script>

</body>
</html>
